<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vendas Digitais v2 | Lojas Guaibim</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--G:#2E8B1E;--G2:#236A16;--G3:#3DAA2A;--Y:#F5C800;}
html,body{height:100%;font-family:'Montserrat',-apple-system,sans-serif;background:#1a1a1a;overflow:hidden;display:flex;flex-direction:column}
#tb{background:linear-gradient(135deg,var(--G2) 0%,var(--G) 60%,var(--G3) 100%);height:58px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 12px rgba(35,106,22,.5);flex-shrink:0;z-index:100}
.tl{display:flex;align-items:center;gap:10px}
.lb{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:8px;padding:4px 12px;display:flex;flex-direction:column;align-items:center}
.ln{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1;text-transform:uppercase}
.ln span{color:var(--Y)}
.ls{font-size:7px;color:rgba(255,255,255,.75);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-top:1px}
.dv{width:1.5px;height:30px;background:rgba(255,255,255,.25);margin:0 8px}
.at{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.02em}
.at em{font-style:normal;font-size:11px;font-weight:600;color:var(--Y);margin-left:4px}
.as{font-size:9px;color:rgba(255,255,255,.6);font-weight:600;margin-top:1px}
.tr{display:flex;align-items:center;gap:8px}
.pq{font-size:11px;font-weight:800;color:var(--G2);background:var(--Y);border:none;border-radius:20px;padding:6px 14px;cursor:pointer;text-decoration:none;transition:background .15s}
.pq:hover{background:#ffe033}
.pr{font-size:11px;font-weight:700;color:rgba(255,255,255,.8);background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 13px;cursor:pointer;transition:all .15s}
.pr:hover{background:rgba(255,255,255,.25)}
#nv{background:#2A2A2A;height:42px;padding:0 20px;display:flex;align-items:center;overflow-x:auto;border-bottom:3px solid var(--Y);flex-shrink:0}
#nv::-webkit-scrollbar{display:none}
.tab{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.4);padding:0 14px;height:42px;display:flex;align-items:center;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;user-select:none;text-transform:uppercase;letter-spacing:.05em;margin-bottom:-3px}
.tab.on{color:var(--Y);border-bottom-color:var(--Y)}
.tab:hover:not(.on){color:rgba(255,255,255,.8)}
#fw{flex:1;position:relative}
#qf{position:absolute;inset:0;width:100%;height:100%;border:none;background:#f5f7f4}
#ov{position:absolute;inset:0;background:#f5f7f4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;transition:opacity .4s}
#ov.hide{opacity:0;pointer-events:none}
.sp{width:38px;height:38px;border:3px solid #e8e8e8;border-top-color:var(--G);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#ov p{font-family:'Montserrat',sans-serif;font-size:13px;color:#555;font-weight:700;text-align:center;padding:0 20px}
#ov small{font-size:12px;color:#888;text-align:center;padding:0 20px;line-height:1.5}
#ov a{color:var(--G);font-weight:800}
</style>
</head>
<body>

<div id="tb">
  <div class="tl">
    <div class="lb">
      <div class="ln">GUA<span>I</span>BIM</div>
      <div class="ls">Do jeito que a Bahia gosta</div>
    </div>
    <div class="dv"></div>
    <div>
      <div class="at">Vendas Digitais <em>v2</em></div>
      <div class="as">Dados ao vivo · Qlik Cloud</div>
    </div>
  </div>
  <div class="tr">
    <div class="pr" onclick="reload()">&#8635; Recarregar</div>
    <a class="pq" href="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8" target="_blank">&#8599; Abrir no Qlik</a>
  </div>
</div>

<div id="nv">
  <div class="tab on"  data-url="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8/sheet/6c072832-a535-4961-a11e-684bbfc75523/state/analysis">Dashboard</div>
  <div class="tab" data-url="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8/sheet/7dc6ad7d-aa7b-40da-9ad4-6dc793968d00/state/analysis">Marketplaces</div>
  <div class="tab" data-url="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8/sheet/b792cc2f-b02b-4fd2-b280-1880808ee603/state/analysis">Produtos</div>
  <div class="tab" data-url="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8/sheet/91fc2b3b-bbb7-4f0e-ab72-9534fc4bdb95/state/analysis">Lojas</div>
  <div class="tab" data-url="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8/sheet/50db3f3b-f1fc-4d04-b610-ff80c1383c5e/state/analysis">Regiões</div>
  <div class="tab" data-url="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8/sheet/0ae7299d-b4d6-4b89-88fa-29d9add1f25a/state/analysis">Estoque</div>
  <div class="tab" data-url="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8/sheet/77cdb22f-0073-49d2-9a6e-07507d0cd8f7/state/analysis">Pedidos</div>
  <div class="tab" data-url="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8/sheet/f8c1dd74-0610-430d-8e55-73215f2d11b8/state/analysis">Quadro Din.</div>
</div>

<div id="fw">
  <div id="ov">
    <div class="sp"></div>
    <p>Carregando Vendas Digitais v2...</p>
    <small>Aguarde ou <a href="https://itprime1.us.qlikcloud.com" target="_blank">faça login no Qlik Cloud</a> e recarregue a página.</small>
  </div>
  <iframe id="qf"
    src="https://itprime1.us.qlikcloud.com/sense/app/9e8c9ec2-fca4-4a81-bb27-10e2eae77cd8/sheet/6c072832-a535-4961-a11e-684bbfc75523/state/analysis"
    allowfullscreen>
  </iframe>
</div>

<script>
var iframe=document.getElementById('qf');
var overlay=document.getElementById('ov');
var timer;

iframe.addEventListener('load',function(){
  clearTimeout(timer);
  setTimeout(function(){overlay.classList.add('hide');},600);
});

timer=setTimeout(function(){
  overlay.querySelector('p').textContent='Faça login no Qlik Cloud para carregar os dados.';
  overlay.querySelector('small').innerHTML='<a href="https://itprime1.us.qlikcloud.com" target="_blank" style="color:#2E8B1E;font-weight:800">&#8594; Clique aqui para fazer login</a>, depois clique em Recarregar.';
},14000);

document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
    t.classList.add('on');
    overlay.classList.remove('hide');
    clearTimeout(timer);
    timer=setTimeout(function(){
      overlay.querySelector('p').textContent='Sessão expirada ou não autenticado.';
      overlay.querySelector('small').innerHTML='<a href="https://itprime1.us.qlikcloud.com" target="_blank" style="color:#2E8B1E;font-weight:800">&#8594; Fazer login no Qlik</a> e depois recarregar.';
    },14000);
    iframe.src=t.dataset.url;
  });
});

function reload(){
  overlay.classList.remove('hide');
  clearTimeout(timer);
  timer=setTimeout(function(){
    overlay.querySelector('p').textContent='Sessão expirada.';
    overlay.querySelector('small').innerHTML='<a href="https://itprime1.us.qlikcloud.com" target="_blank" style="color:#2E8B1E;font-weight:800">&#8594; Fazer login</a> e recarregar.';
  },14000);
  iframe.src=iframe.src;
}
</script>
</body>
</html>
